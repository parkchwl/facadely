spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/facadely}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:}
    username: ${SPRING_DATASOURCE_USERNAME:facadely}
    password: ${SPRING_DATASOURCE_PASSWORD:facadely}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

app:
  auth:
    frontend-origin: ${FRONTEND_ORIGIN:http://localhost:3000}
    default-locale: ${DEFAULT_LOCALE:en}
    terms-version: ${TERMS_VERSION:2026-01}
    privacy-version: ${PRIVACY_VERSION:2026-01}
    jwt:
      access-secret: ${JWT_ACCESS_SECRET:change-this-access-secret-change-this-access-secret}
      access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
      refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:1209600}
    cookie:
      secure: ${COOKIE_SECURE:false}
      same-site: ${COOKIE_SAME_SITE:Lax}
      access-name: ${COOKIE_ACCESS_NAME:facadely_at}
      refresh-name: ${COOKIE_REFRESH_NAME:facadely_rt}

logging:
  level:
    org.springframework.security: INFO
