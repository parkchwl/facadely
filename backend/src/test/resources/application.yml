spring:
  datasource:
    url: jdbc:h2:mem:facadely-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"

app:
  auth:
    frontend-origin: http://localhost:3000
