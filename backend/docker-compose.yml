version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: facadely-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: facadely
      POSTGRES_USER: facadely
      POSTGRES_PASSWORD: facadely
    volumes:
      - facadely_postgres_data:/var/lib/postgresql/data

volumes:
  facadely_postgres_data:
